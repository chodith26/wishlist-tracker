<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav>
        <h1>🛒 Wishlist <span>Tracker</span></h1>
    </nav>

    <main>
        <section class="form-section">
            <h2>Add Item</h2>
            <form action="/add" method="POST">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name"
                        placeholder="e.g. boAt Headphones" required>
                </div>
                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="text" id="price" name="price"
                        placeholder="e.g. ₹1,299" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="Electronics">Electronics</option>
                        <option value="Books">Books</option>
                        <option value="Kitchen">Kitchen</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Sports">Sports</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Add to Wishlist</button>
            </form>
        </section>

        <section class="items-section">
            <h2>Your Wishlist ({{ count }} items)</h2>
            <div id="wishlist-grid" class="grid">
            </div>
        </section>
    </main>
    <footer>
        <p>Wishlist Tracker — Built with Flask + SQLite</p>
    </footer>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
